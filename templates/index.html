<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shorty - URL Shortener</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#4facfe,#00f2fe);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:420px;
            background:white;
            padding:35px;
            border-radius:15px;
            box-shadow:0 8px 20px rgba(0,0,0,0.2);
            text-align:center;
        }

        h1{
            color:#333;
            margin-bottom:10px;
        }

        p{
            color:#666;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:12px;
            border:2px solid #ddd;
            border-radius:8px;
            font-size:16px;
            outline:none;
            margin-bottom:15px;
        }

        input:focus{
            border-color:#4facfe;
        }

        button{
            width:100%;
            padding:12px;
            background:#4facfe;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#008cff;
        }

        .result{
            margin-top:25px;
            padding:15px;
            background:#f4f4f4;
            border-radius:10px;
        }

        .result a{
            color:#0066cc;
            text-decoration:none;
            font-weight:bold;
            word-wrap:break-word;
        }

        .result a:hover{
            text-decoration:underline;
        }

        footer{
            margin-top:20px;
            color:#888;
            font-size:13px;
        }
    </style>

</head>
<body>

<div class="container">

    <h1>🔗 Shorty</h1>
    <p>Paste your long URL and get a short one instantly.</p>

    <form method="POST">

        <input
            type="url"
            name="url"
            placeholder="Enter your URL..."
            required
        >

        <button type="submit">Shorten URL</button>

    </form>

   {% if short_url %}
<div class="result">

    <h3>Your Short URL</h3>

    <input
        type="text"
        id="shortUrl"
        value="{{ short_url }}"
        readonly
        style="margin-top:10px;"
    >

    <button onclick="copyURL()" style="margin-top:10px;">
        📋 Copy URL
    </button>

    <p id="copyMessage" style="color:green;margin-top:10px;"></p>

    <p style="margin-top:15px;">
        Redirecting in <span id="count">5</span> seconds...
    </p>

</div>

<script>

function copyURL() {
    const url = document.getElementById("shortUrl");

    navigator.clipboard.writeText(url.value);

    document.getElementById("copyMessage").innerHTML =
        "✅ Short URL copied to clipboard!";
}

let time = 5;

const countdown = setInterval(function () {

    time--;

    document.getElementById("count").innerHTML = time;

    if(time <= 0){
        clearInterval(countdown);
        window.location.href = "{{ long_url }}";
    }

},1000);

</script>

{% endif %}
    <footer>
        Made with ❤️ using Python & Flask
    </footer>

</div>

</body>
</html>
